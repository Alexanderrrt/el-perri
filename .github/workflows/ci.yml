name: CI — Build & Verify

# Trigger on: push to any branch, pull requests
on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, develop]

jobs:
  build:
    name: Build & Verify
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x]

    steps:
      # 1. Check out code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Build (catches syntax errors, type mismatches)
      - name: Build
        run: npm run build

      # 5. (Optional) Run linting if configured
      # - name: Lint
      #   run: npm run lint

      # 6. (Optional) Run tests if configured
      # - name: Test
      #   run: npm run test

  # Security scan for hardcoded secrets (optional but recommended)
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/main'  # Skip on main to avoid noise
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_ENABLE_COMMENTS: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
